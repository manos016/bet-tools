            <option value="non-vip">Non-VIP</option>

            <option value="platinum1">Platinum I</option>

            <option value="platinum3">Platinum III</option>
            <option value="platinum4">Platinum IV</option>
            <option value="platinum5">Platinum V</option>
            <option value="platinum6">Platinum VI</option>

            <option value="diamond2">Diamond II</option>
            <option value="diamond3">Diamond III</option>
            <option value="diamond4">Diamond IV</option>
            <option value="diamond5">Diamond V</option>
        </select>

        <label for="progress">Progress:</label>
        <div class="progress-container">
            <input type="number" id="progress" placeholder="0.00" min="0" max="99.99" step="0.01" autocomplete="off">
            <span>%</span>
        </div>
        <button id="calcBtn" onclick="calc()">Calc 🇧🇷</button>
        <div class="result" id="result"></div>
    </div>

    <a href="index.html" style="display:block;text-align:center;margin-top:20px;color:#1475e1;text-decoration:none;font-weight:bold;transition:color 0.3s ease;">Back to Home</a>
    <footer>by MΛИΦΞL</footer>

    <script>
        const WORKER_URL = "https://vipcalc.mano016.workers.dev/";

        async function calc() {
            const progress = parseFloat(document.getElementById("progress").value);
            const levelId = document.getElementById("level").value;
            const btn = document.getElementById("calcBtn");

            if (isNaN(progress)) { alert("Please enter a numeric value for progress"); return; }
            if (progress < 0 || progress > 99.99) { alert("The progress must be between 0 and 99.99"); return; }

            btn.disabled = true;
            btn.textContent = "Calculating...";

            try {
                const res = await fetch(WORKER_URL, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ country: "brasil", levelId, progress }),
                });
                const data = await res.json();
                if (data.error) { alert("Error: " + data.error); return; }
                if (data.noNextLevel) {
                    document.getElementById("result").innerHTML = `<div class="result-content">No next level available</div>`;
                    return;
                }

                const formatted = data.remainingAmount.toLocaleString('pt-BR');
                const resultText = `Será necessário aproximadamente R$ ${formatted} em apostas no cassino para alcançar o próximo nível (${data.nextLevelName}).<br><br>Lembrando que apostas esportivas o progresso VIP avança 3 vezes mais rápido.⚽🏀🏐😉`;

                document.getElementById("result").innerHTML = `
                    <div class="result-content">${resultText}</div>
                    <div class="copy-container">
                        <span class="copy-icon" id="copy-icon">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
                                <path fill-rule="evenodd" d="M4 2a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2zm2-1a1 1 0 0 0-1 1v8a1 1 0 0 0 1 1h8a1 1 0 0 0 1-1V2a1 1 0 0 0-1-1zM2 5a1 1 0 0 0-1 1v8a1 1 0 0 0 1 1h8a1 1 0 0 0 1-1v-1h1v1a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h1v1z"/>
                            </svg>
                        </span>
                    </div>`;

                document.getElementById("copy-icon").addEventListener("click", function () {
                    const textToCopy = `Será necessário aproximadamente R$ ${formatted} em apostas no cassino para alcançar o próximo nível (${data.nextLevelName}).\n\nLembrando que apostas esportivas o progresso VIP avança 3 vezes mais rápido.⚽🏀🏐😉`;
                    navigator.clipboard.writeText(textToCopy).then(() => {
                        const icon = document.getElementById("copy-icon");
                        const orig = icon.innerHTML;
                        icon.innerHTML = "Copied!";
                        setTimeout(() => icon.innerHTML = orig, 1000);
                    });
                });
            } catch (e) {
                alert("Connection error. Please try again.");
            } finally {
                btn.disabled = false;
                btn.textContent = "Calc 🇧🇷";
            }
        }

        function clearResult() { document.getElementById("result").innerHTML = ""; }
        document.getElementById("level").addEventListener("change", clearResult);
        document.getElementById("progress").addEventListener("input", clearResult);
        document.getElementById("progress").addEventListener("keypress", e => { if (e.key === "Enter") calc(); });
    </script>
